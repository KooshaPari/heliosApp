name: Verify Merge Token

on:
  workflow_call:
    inputs:
      stage:
        description: Expected stage label
        required: true
        type: string
      head_sha:
        description: Expected PR head SHA
        required: true
        type: string
      token:
        description: Merge token to verify (optional override)
        required: false
        default: ""
        type: string
    outputs:
      token_id:
        description: Verified token identifier
        value: ${{ jobs.verify.outputs.token_id }}
  workflow_dispatch:
    inputs:
      stage:
        description: Expected stage label
        required: true
        type: string
      head_sha:
        description: Expected PR head SHA
        required: true
        type: string
      token:
        description: Merge token to verify
        required: false
        default: ""

permissions:
  contents: read
  pull-requests: read

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      token_id: ${{ steps.verify.outputs.token_id }}
    steps:
      - name: Verify merge token
        id: verify
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_STAGE: ${{ inputs.stage || github.event.inputs.stage }}
          EXPECTED_SHA: ${{ inputs.head_sha || github.event.inputs.head_sha }}
          PROVIDED_TOKEN: ${{ inputs.token || github.event.inputs.token }}
          STRICT_TOKEN: ${{ vars.MERGE_TOKEN }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          python - <<'PY'
          import base64
          import datetime as dt
          import hashlib
          import json
          import os
          import re
          import sys

          expected_stage = os.environ["EXPECTED_STAGE"].strip()
          expected_sha = os.environ["EXPECTED_SHA"].strip()
          provided_token = os.environ.get("PROVIDED_TOKEN", "").strip()
          strict_token = os.environ.get("STRICT_TOKEN", "").strip()
          pr_body = os.environ.get("PR_BODY", "") or ""

          body_match = re.search(r"(?:^|\s)merge-token:\s*([A-Za-z0-9_\-+=./]+)", pr_body, re.IGNORECASE)
          body_token = body_match.group(1).strip() if body_match else ""

          token = provided_token or strict_token or body_token
          if not token:
              print("No merge token found. Provide inputs.token, vars.MERGE_TOKEN, or 'merge-token:' in PR body.", file=sys.stderr)
              sys.exit(1)

          try:
              envelope_raw = base64.urlsafe_b64decode(token.encode("utf-8"))
              envelope = json.loads(envelope_raw.decode("utf-8"))
          except Exception as exc:
              print(f"Invalid merge token encoding: {exc}", file=sys.stderr)
              sys.exit(1)

          payload = envelope.get("payload")
          digest = envelope.get("digest")
          if not isinstance(payload, dict) or not isinstance(digest, str):
              print("Malformed merge token envelope.", file=sys.stderr)
              sys.exit(1)

          canonical = json.dumps(payload, sort_keys=True, separators=(",", ":")).encode("utf-8")
          expected_digest = hashlib.sha256(canonical).hexdigest()
          if digest != expected_digest:
              print("Merge token digest mismatch.", file=sys.stderr)
              sys.exit(1)

          now = dt.datetime.now(tz=dt.timezone.utc)
          try:
              expires_at = dt.datetime.fromisoformat(payload["expires_at"])
          except Exception:
              print("Token expires_at is missing or invalid.", file=sys.stderr)
              sys.exit(1)
          if expires_at.tzinfo is None:
              expires_at = expires_at.replace(tzinfo=dt.timezone.utc)
          if expires_at <= now:
              print(f"Merge token expired at {expires_at.isoformat()}.", file=sys.stderr)
              sys.exit(1)

          if payload.get("repo") != os.environ["GITHUB_REPOSITORY"]:
              print("Merge token repo mismatch.", file=sys.stderr)
              sys.exit(1)
          if payload.get("stage") != expected_stage:
              print(
                  f"Merge token stage mismatch: expected {expected_stage}, got {payload.get('stage')}.",
                  file=sys.stderr,
              )
              sys.exit(1)
          if payload.get("head_sha") != expected_sha:
              print(
                  f"Merge token head_sha mismatch: expected {expected_sha}, got {payload.get('head_sha')}.",
                  file=sys.stderr,
              )
              sys.exit(1)

          token_id = str(payload.get("token_id", ""))
          if not token_id:
              print("Merge token missing token_id.", file=sys.stderr)
              sys.exit(1)

          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as out:
              out.write(f"token_id={token_id}\n")

          print("Merge token verification passed.")
          print(f"token_id={token_id}")
          print(f"stage={expected_stage}")
          print(f"head_sha={expected_sha}")
          print(f"expires_at={expires_at.isoformat()}")
          PY
