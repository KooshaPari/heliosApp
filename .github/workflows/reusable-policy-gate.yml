name: Reusable Policy Gate

on:
  workflow_call:
    inputs:
      token:
        description: Optional merge token override for verify step
        required: false
        default: ""
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  evaluate-governance:
    runs-on: ubuntu-latest
    outputs:
      source_stage: ${{ steps.enforce.outputs.source_stage }}
      target_stage: ${{ steps.enforce.outputs.target_stage }}
      strict: ${{ steps.enforce.outputs.strict }}
      required_jobs_csv: ${{ steps.enforce.outputs.required_jobs_csv }}
      requires_merge_token: ${{ steps.enforce.outputs.requires_merge_token }}
      eligible: ${{ steps.enforce.outputs.eligible }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Count approvals
        id: approvals
        uses: actions/github-script@v7
        with:
          script: |
            if (!context.payload.pull_request) {
              core.setOutput('approvals_count', '0');
              core.setOutput('codeowner_approved', 'false');
              return;
            }
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const latestByUser = new Map();
            for (const review of reviews) {
              latestByUser.set(review.user.login, review.state);
            }
            let approvals = 0;
            for (const state of latestByUser.values()) {
              if (state === 'APPROVED') approvals += 1;
            }
            core.setOutput('approvals_count', String(approvals));
            core.setOutput('codeowner_approved', approvals > 0 ? 'true' : 'false');

      - name: Install parser dependency
        run: python -m pip install --disable-pip-version-check pyyaml

      - name: Enforce policy templates
        id: enforce
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
          BASE_BRANCH: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || 0 }}
          IS_DRAFT: ${{ github.event.pull_request.draft || false }}
          REVIEW_DECISION: ${{ github.event.pull_request.review_decision || '' }}
          APPROVALS_COUNT: ${{ steps.approvals.outputs.approvals_count }}
          CODEOWNER_APPROVED: ${{ steps.approvals.outputs.codeowner_approved }}
          STRICT_FLAG: ${{ vars.STAGE_GATES_STRICT }}
        run: |
          python scripts/governance/enforce_policy_gate.py \
            --head-branch "$HEAD_BRANCH" \
            --base-branch "$BASE_BRANCH" \
            --head-sha "$HEAD_SHA" \
            --repo "$REPO" \
            --pr-number "$PR_NUMBER" \
            --is-draft "$IS_DRAFT" \
            --review-decision "$REVIEW_DECISION" \
            --approvals-count "$APPROVALS_COUNT" \
            --codeowner-approved "$CODEOWNER_APPROVED" \
            --strict-flag "$STRICT_FLAG" \
            --token-output /tmp/merge-eligibility-token.json

      - name: Upload merge eligibility payload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merge-eligibility-token
          path: /tmp/merge-eligibility-token.json

  vale:
    needs: evaluate-governance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Vale docs policy check
        uses: errata-ai/vale-action@v2
        with:
          files: |
            docs
            templates/governance
            templates/stage-gates.yml
            templates/stage-gates/v1/stage-gates.yml
          vale_flags: "--config=.vale.ini"
          fail_on_error: true

  verify-merge-token:
    needs: evaluate-governance
    if: needs.evaluate-governance.outputs.requires_merge_token == 'true'
    uses: ./.github/workflows/verify-merge-token.yml
    with:
      stage: ${{ needs.evaluate-governance.outputs.source_stage }}
      head_sha: ${{ github.event.pull_request.head.sha || github.sha }}
      token: ${{ inputs.token }}
    secrets: inherit

  issue-merge-token:
    needs: [evaluate-governance, vale]
    if: needs.evaluate-governance.outputs.eligible == 'true'
    uses: ./.github/workflows/issue-merge-token.yml
    with:
      stage: ${{ needs.evaluate-governance.outputs.source_stage }}
      head_sha: ${{ github.event.pull_request.head.sha || github.sha }}
      pr_number: ${{ github.event.pull_request.number || 0 }}
    secrets: inherit
