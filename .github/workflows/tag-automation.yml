name: Tag Automation

# Delegates to phenoShared reusable workflow.
# See: https://github.com/KooshaPari/phenoShared/blob/main/.github/workflows/tag-automation.yml

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  tag:
    uses: KooshaPari/phenoShared/.github/workflows/tag-automation.yml@05d6cec411bef7a8d7f419b60327c6610f28386e
    permissions:
      contents: write
