name: Issue Merge Token

on:
  workflow_call:
    inputs:
      stage:
        description: Stage label for this token
        required: true
        type: string
      head_sha:
        description: PR head SHA this token is bound to
        required: true
        type: string
      ttl_hours:
        description: Token expiration window in hours
        required: false
        default: 24
        type: number
      pr_number:
        description: PR number for token metadata
        required: false
        default: 0
        type: number
    outputs:
      token:
        description: Merge token payload (base64url)
        value: ${{ jobs.issue.outputs.token }}
  workflow_dispatch:
    inputs:
      stage:
        description: Stage label for this token
        required: true
        type: string
      head_sha:
        description: PR head SHA this token is bound to
        required: true
        type: string
      ttl_hours:
        description: Token expiration window in hours
        required: false
        default: "24"
      pr_number:
        description: PR number for token metadata
        required: false
        default: "0"

permissions:
  contents: read
  pull-requests: write

jobs:
  issue:
    runs-on: ubuntu-latest
    outputs:
      token: ${{ steps.issue.outputs.token }}
    steps:
      - name: Issue merge token
        id: issue
        env:
          INPUT_STAGE: ${{ inputs.stage || github.event.inputs.stage }}
          INPUT_HEAD_SHA: ${{ inputs.head_sha || github.event.inputs.head_sha }}
          INPUT_TTL_HOURS: ${{ inputs.ttl_hours || github.event.inputs.ttl_hours }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number || github.event.inputs.pr_number }}
        run: |
          python - <<'PY'
          import base64
          import datetime as dt
          import hashlib
          import json
          import os
          import secrets

          stage = os.environ["INPUT_STAGE"].strip()
          head_sha = os.environ["INPUT_HEAD_SHA"].strip()
          ttl_hours = int(float(os.environ.get("INPUT_TTL_HOURS", "24") or "24"))
          pr_number = int(float(os.environ.get("INPUT_PR_NUMBER", "0") or "0"))

          if not stage:
              raise SystemExit("stage is required")
          if not head_sha:
              raise SystemExit("head_sha is required")

          now = dt.datetime.now(tz=dt.timezone.utc)
          exp = now + dt.timedelta(hours=ttl_hours)
          payload = {
              "version": 1,
              "token_id": secrets.token_hex(12),
              "repo": os.environ["GITHUB_REPOSITORY"],
              "stage": stage,
              "head_sha": head_sha,
              "pr_number": pr_number,
              "issued_at": now.isoformat(),
              "expires_at": exp.isoformat(),
              "issuer": os.environ.get("GITHUB_ACTOR", ""),
          }
          canonical = json.dumps(payload, sort_keys=True, separators=(",", ":")).encode("utf-8")
          digest = hashlib.sha256(canonical).hexdigest()
          envelope = {"payload": payload, "digest": digest}
          token = base64.urlsafe_b64encode(
              json.dumps(envelope, sort_keys=True, separators=(",", ":")).encode("utf-8")
          ).decode("utf-8")

          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as out:
              out.write(f"token={token}\n")

          print("Issued merge token successfully.")
          print(f"stage={stage}")
          print(f"head_sha={head_sha}")
          print(f"pr_number={pr_number}")
          print(f"expires_at={payload['expires_at']}")
          print(f"token_id={payload['token_id']}")
          PY
