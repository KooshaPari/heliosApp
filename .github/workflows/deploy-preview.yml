name: Preview Deployment

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    name: preview-deploy
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    outputs:
      preview-url: ${{ steps.deploy.outputs.preview_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20

      - name: Cache Bun modules
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Build runtime
        run: bun run --cwd apps/runtime build

      - name: Build desktop
        run: bun run --cwd apps/desktop build

      - name: Build colab-renderer
        run: bun run --cwd apps/colab-renderer build

      - name: Build docs
        run: bun run docs:build

      - name: Generate preview URL
        id: deploy
        run: |
          PREVIEW_URL="https://preview-${{ github.event.pull_request.number }}-heliosapp.example.com"
          echo "preview_url=${PREVIEW_URL}" >> "$GITHUB_OUTPUT"
          echo "Preview URL: ${PREVIEW_URL}"

      - name: Deploy preview
        run: |
          echo "Deploying preview for PR #${{ github.event.pull_request.number }}"
          echo "Preview URL: ${{ steps.deploy.outputs.preview_url }}"
          echo "Commit: ${{ github.event.pull_request.head.sha }}"
        env:
          DEPLOY_ENV: preview
          PREVIEW_TOKEN: ${{ secrets.PREVIEW_DEPLOY_TOKEN }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.preview_url }}';
            const prNumber = context.payload.pull_request.number;
            const body = `Preview deployment ready for commit \`${context.payload.pull_request.head.sha.slice(0, 7)}\`\n\n- **Preview URL**: ${previewUrl}\n- **Status**: Deployed\n\n> Preview environments are temporary and will be cleaned up when the PR is merged or closed.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existingComment = comments.find(comment =>
              comment.user.login === 'github-actions[bot]' &&
              comment.body.includes('Preview deployment ready')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body,
              });
            }

  cleanup:
    name: preview-cleanup
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    steps:
      - name: Clean up preview environment
        run: |
          echo "Cleaning up preview environment for PR #${{ github.event.pull_request.number }}"
        env:
          PREVIEW_TOKEN: ${{ secrets.PREVIEW_DEPLOY_TOKEN }}

      - name: Comment cleanup on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: 'Preview environment has been cleaned up.',
            });
