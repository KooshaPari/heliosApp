name: Compliance Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  compliance-check:
    runs-on: ubuntu-latest
    name: Constitution Compliance Validation
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.20"

      - name: Install dependencies
        run: bun install

      - name: Get changed files
        id: files
        uses: actions/github-script@v9
        with:
          script: |
            const { data } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            const files = data.map(f => f.filename);
            core.setOutput('files', JSON.stringify(files));
            console.log('Changed files:', files);

      - name: Generate SBOM (syft)
        uses: anchore/sbom-action@v0
        with:
          file: ./package.json
          format: 'spdx-json'
          output-file: 'sbom.spdx.json'

      - name: Run compliance checker
        id: compliance
        continue-on-error: true
        run: |
          FILES='${{ steps.files.outputs.files }}'
          FILES_ARRAY=$(echo "$FILES" | jq -r '.[]' | tr '\n' ' ')
          bun run scripts/compliance-checker.ts --json $FILES_ARRAY > compliance-result.json 2>compliance-stderr.log
          cat compliance-result.json
          if [ -s compliance-stderr.log ]; then
            echo "::warning::Compliance checker stderr:"
            cat compliance-stderr.log
          fi

      - name: Parse compliance results
        id: results
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            try {
              const result = JSON.parse(fs.readFileSync('compliance-result.json', 'utf-8'));
              core.setOutput('passed', String(result.passed));
              core.setOutput('findings', JSON.stringify(result.findings || []));
            } catch (e) {
              core.warning(`Failed to parse compliance results: ${e.message}`);
              core.setOutput('passed', 'false');
              core.setOutput('findings', JSON.stringify([]));
            }

      - name: Post compliance failure comment
        if: steps.results.outputs.passed == 'false'
        uses: actions/github-script@v9
        with:
          script: |
            const findings = JSON.parse('${{ steps.results.outputs.findings }}');
            
            let comment = '## Compliance Check - Violations Found\n\n';
            comment += `Found ${findings.length} constitution violation(s):\n\n`;
            
            findings.forEach((f, i) => {
              comment += `### ${i + 1}. ${f.check}`;
              if (f.line) {
                comment += ` (${f.filePath}:${f.line})`;
              } else {
                comment += ` (${f.filePath})`;
              }
              comment += '\n\n';
              comment += `**Description:** ${f.description}\n\n`;
              comment += `**Constitution Section:** ${f.constitutionSection}`;
              if (f.constitutionLine) {
                comment += ` ([Line ${f.constitutionLine}](.kittify/memory/constitution.md#L${f.constitutionLine}))`;
              }
              comment += '\n\n';
              comment += `**Remediation:** ${f.remediationHint}\n\n`;
            });
            
            comment += '---\n';
            comment += '**Note:** To proceed with an exception, create an ADR in `/docs/adrs/` and link it in the PR description.\n';
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

      - name: Post compliance success comment
        if: steps.results.outputs.passed == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## Compliance Check ✅\n\nAll constitution compliance checks passed!'
            });

      - name: Report status
        if: always()
        run: |
          if [ "${{ steps.results.outputs.passed }}" = "true" ]; then
            echo "Compliance check PASSED"
            exit 0
          else
            echo "Compliance check FAILED"
            exit 1
          fi
