name: Release Drafter
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-drafter:
    uses: KooshaPari/phenoShared/.github/workflows/reusable-release-drafter.yml@bf2c65ac776d0c759406dfdb8551e6b344914ea0
    permissions:
      contents: write
      pull-requests: write
