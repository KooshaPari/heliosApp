name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20

      - name: Cache Bun modules
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Run typecheck
        run: bun run typecheck

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20

      - name: Cache Bun modules
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Run lint
        run: bun run lint

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20

      - name: Cache Bun modules
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20

      - name: Cache Bun modules
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Build runtime
        run: bun run --cwd apps/runtime build

      - name: Build desktop
        run: bun run --cwd apps/desktop build

      - name: Build colab-renderer
        run: bun run --cwd apps/colab-renderer build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/runtime/dist/
            apps/desktop/dist/
            apps/colab-renderer/dist/
          retention-days: 7

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20

      - name: Cache Bun modules
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Run coverage
        run: bun run test:coverage

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ci-summary:
    name: ci-summary
    runs-on: ubuntu-latest
    needs: [typecheck, lint, unit-tests, build, coverage, secret-scan]
    if: always()
    steps:
      - name: Assert required jobs succeeded
        env:
          TYPECHECK: ${{ needs.typecheck.result }}
          LINT: ${{ needs.lint.result }}
          UNIT_TESTS: ${{ needs.unit-tests.result }}
          BUILD: ${{ needs.build.result }}
          COVERAGE: ${{ needs.coverage.result }}
          SECRET_SCAN: ${{ needs.secret-scan.result }}
        run: |
          set -euo pipefail
          echo "typecheck=${TYPECHECK}"
          echo "lint=${LINT}"
          echo "unit-tests=${UNIT_TESTS}"
          echo "build=${BUILD}"
          echo "coverage=${COVERAGE}"
          echo "secret-scan=${SECRET_SCAN}"

          test "${TYPECHECK}" = "success"
          test "${LINT}" = "success"
          test "${UNIT_TESTS}" = "success"
          test "${BUILD}" = "success"
          test "${COVERAGE}" = "success"
          test "${SECRET_SCAN}" = "success"
