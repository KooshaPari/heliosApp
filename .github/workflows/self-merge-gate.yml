name: Self-Merge Gate

on:
  pull_request:
    types: [synchronize, opened, reopened]
    branches: [main]
  status: {}

jobs:
  check-merge-readiness:
    runs-on: ubuntu-latest
    name: Check Merge Readiness
    permissions:
      contents: read
      statuses: read
      checks: read
      pull-requests: read

    steps:
      - name: Check PR merge conditions
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const actor = context.actor;
            const normalize = value => String(value || "").toLowerCase();

            const resolvePullRequestNumberFromPayload = async (commitSha) => {
              if (!commitSha) {
                return null;
              }
              const prs = await github.paginate(
                github.rest.repos.listPullRequestsAssociatedWithCommit,
                {
                  owner,
                  repo,
                  commit_sha: commitSha,
                }
              );
              const openPr = prs.find((pr) => pr.state === "open" && pr.base?.ref === "main");
              return openPr ? openPr.number : null;
            };

            const pullRequestNumber = context.payload.pull_request
              ? context.payload.pull_request.number
              : context.payload?.check_suite?.pull_requests?.[0]?.number
                || context.payload?.check_run?.pull_requests?.[0]?.number
                || await resolvePullRequestNumberFromPayload(
                context.payload?.pull_request?.head?.sha ||
                context.payload?.sha ||
                context.sha
              );

            if (!pullRequestNumber) {
              core.info("No associated pull request found for this event. Skipping merge gate check.");
              core.setOutput('can-self-merge', false);
              core.setOutput('all-checks-passed', false);
              core.setOutput('has-approval', false);
              core.setOutput('is-author', false);
              core.setOutput('pr-number', '');
              core.setOutput('missing-requirements', ['no-associated-pr']);
              core.setOutput('missing-checks', ['no-associated-pr'].join('\n'));
              return;
            }
            
            // Get PR details
            const pr = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pullRequestNumber
            });
            
            // Check if author is the actor
            const isAuthor = pr.data.user.login === actor;
            
            // Get reviews
            const reviews = await github.rest.pulls.listReviews({
              owner,
              repo,
              pull_number: pullRequestNumber
            });
            
            // Track latest review state per reviewer to handle DISMISSED/CHANGES_REQUESTED
            const latestReviewByUser = {};
            reviews.data.forEach(review => {
              if (review.state !== 'COMMENTED') {
                latestReviewByUser[review.user.login] = review.state;
              }
            });
            const approvals = Object.fromEntries(
              Object.entries(latestReviewByUser).filter(([, state]) => state === 'APPROVED')
            );
            
            // Get commit status checks
            const commit = pr.data.head;
            const statuses = await github.rest.repos.getCombinedStatusForRef({
              owner,
              repo,
              ref: commit.sha
            });

            const requiredChecks = [
              {
                key: 'quality-gates',
                aliases: [
                  'quality-gates',
                  'quality gates',
                  'quality gates pipeline',
                  'Quality Gates Pipeline'
                ],
              },
              {
                key: 'gca-review',
                aliases: ['gca-review', 'gca review', 'GCA Code Analysis', 'gca'],
              },
              {
                key: 'coderabbit-review',
                aliases: ['coderabbit-review', 'coderabbit review'],
              },
              {
                key: 'compliance-check',
                aliases: [
                  'compliance-check',
                  'Constitution Compliance Validation',
                  'constitution compliance validation'
                ],
              },
            ];

            const checkResults = {};
            const requirementStatus = {};
            const aliasToCheck = new Map();

            requiredChecks.forEach(({ key, aliases }) => {
              checkResults[key] = false;
              requirementStatus[key] = "not found";
              aliases.forEach(alias => {
                aliasToCheck.set(normalize(alias), key);
              });
            });

            const updateRequirement = (key, passed, reason) => {
              if (!checkResults[key] || passed) {
                checkResults[key] = passed;
                if (passed) {
                  requirementStatus[key] = "passed";
                } else if (reason) {
                  requirementStatus[key] = reason;
                }
              }
            };

            // Check legacy status checks
            (statuses.data?.statuses || []).forEach(status => {
              const key = aliasToCheck.get(normalize(status.context));
              if (!key) {
                return;
              }
              const state = normalize(status.state);
              if (state === "success") {
                updateRequirement(key, true, "passed");
              } else {
                updateRequirement(key, false, `status check failed with ${state}`);
              }
            });

            // Check rich check runs when available
            let checkRuns = [];
            try {
              checkRuns = await github.paginate(github.rest.checks.listForRef, {
                owner,
                repo,
                ref: commit.sha,
              });
            } catch (error) {
              console.log(`Unable to fetch check runs: ${error.message}`);
            }

            checkRuns.forEach(run => {
              const key = aliasToCheck.get(normalize(run.name));
              if (!key) {
                return;
              }
              const status = normalize(run.status);
              const conclusion = normalize(run.conclusion);
              const isPassing = status === "completed" && conclusion === "success";
              if (isPassing) {
                updateRequirement(key, true, "passed");
              } else {
                const reason = conclusion ? `check run ${status}/${conclusion}` : `check run ${status}`;
                updateRequirement(key, false, reason);
              }
            });

            const allChecksPassed = requiredChecks.every(({ key }) => checkResults[key] === true);
            const missingChecks = requiredChecks
              .filter(({ key }) => !checkResults[key])
              .map(({ key }) => `${key} (${requirementStatus[key]})`);
            
            // Verify at least one approval from agent/reviewer
            const hasApproval = Object.keys(approvals).length > 0;
            const isApprovalMissing = !hasApproval;
            const isAuthorMissing = !isAuthor;
            
            // Determine if self-merge is allowed
            const canSelfMerge = allChecksPassed && hasApproval && isAuthor;
            
            // Output status
            console.log(`All checks passed: ${allChecksPassed}`);
            console.log(`Has approval: ${hasApproval}`);
            console.log(`Is author: ${isAuthor}`);
            console.log(`Can self-merge: ${canSelfMerge}`);
            
            // Set output for downstream steps
            core.setOutput('can-self-merge', canSelfMerge);
            core.setOutput('all-checks-passed', allChecksPassed);
            core.setOutput('has-approval', hasApproval);
            core.setOutput('is-author', isAuthor);
            core.setOutput('pr-number', pullRequestNumber);
            const missingRequirements = [
              ...missingChecks,
              ...(isApprovalMissing ? ["approvals"] : []),
              ...(isAuthorMissing ? ["author"] : []),
            ];
            core.setOutput('missing-requirements', missingRequirements.join(','));
            core.setOutput('missing-checks', missingChecks.join('\n'));
      
      - name: Comment on missing requirements
        if: steps.check.outputs.can-self-merge == 'false' && steps.check.outputs.pr-number != ''
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.check.outputs.pr-number }}
          ALL_CHECKS_PASSED: ${{ steps.check.outputs.all-checks-passed }}
          HAS_APPROVAL: ${{ steps.check.outputs.has-approval }}
          IS_AUTHOR: ${{ steps.check.outputs.is-author }}
          MISSING_CHECKS: ${{ steps.check.outputs.missing-checks }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const number = Number(process.env.PR_NUMBER);
            const allChecksPassed = process.env.ALL_CHECKS_PASSED === 'true';
            const hasApproval = process.env.HAS_APPROVAL === 'true';
            const isAuthor = process.env.IS_AUTHOR === 'true';
            const missingChecks = process.env.MISSING_CHECKS ? process.env.MISSING_CHECKS.split('\n') : [];

            let message = 'Self-merge is blocked due to missing requirements:\n\n';
            if (!allChecksPassed) {
              message += '- Required checks missing or not passing:\n';
              for (const check of missingChecks) {
                message += `  - ${check}\n`;
              }
            }
            if (!hasApproval) {
              message += '- PR does not have required review approval\n';
            }
            if (!isAuthor) {
              message += '- Only the PR author can self-merge\n';
            }
            message += '\nPlease ensure all checks pass before merging.';

            github.rest.issues.createComment({
              owner,
              repo,
              issue_number: number,
              body: message
            });

      - name: Allow self-merge
        if: steps.check.outputs.can-self-merge == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const number = Number('${{ steps.check.outputs.pr-number }}');
            github.rest.issues.createComment({
              owner,
              repo,
              issue_number: number,
              body: 'All merge requirements satisfied. You may now self-merge this PR.'
            });
