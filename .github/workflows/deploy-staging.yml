name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20

      - name: Cache Bun modules
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Build runtime
        run: bun run --cwd apps/runtime build

      - name: Build desktop
        run: bun run --cwd apps/desktop build

      - name: Build colab-renderer
        run: bun run --cwd apps/colab-renderer build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: staging-build
          path: |
            apps/runtime/dist/
            apps/desktop/dist/
            apps/colab-renderer/dist/
          retention-days: 14

      - name: Get commit sha
        id: sha
        run: echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy-staging:
    name: deploy-staging
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: staging
      url: ${{ vars.STAGING_URL || 'https://staging.heliosapp.example.com' }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: staging-build
          path: dist/

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment"
          echo "Commit: ${{ needs.build.outputs.sha }}"
          echo "Deployed at: $(date -u)"
        env:
          DEPLOY_ENV: staging
          DEPLOY_TOKEN: ${{ secrets.STAGING_DEPLOY_TOKEN }}

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging"
        env:
          STAGING_URL: ${{ vars.STAGING_URL }}

      - name: Notify deployment status
        if: always()
        run: |
          echo "Staging deployment ${{ job.status }}"
          echo "Commit: ${{ needs.build.outputs.sha }}"
