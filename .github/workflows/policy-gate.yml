name: Policy Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  policy-gate:
    name: policy-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce PR policy
        shell: bash
        env:
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          set -euo pipefail

          if [[ -z "${HEAD_SHA:-}" || -z "${BASE_REF:-}" || -z "${BASE_SHA:-}" ]]; then
            echo "ERROR: missing PR SHA context (HEAD_SHA, BASE_REF, or BASE_SHA)."
            exit 1
          fi

          # Prevent merge commits in PR branch commits only (merge-base..PR_HEAD)
          PR_HEAD="${HEAD_SHA}"
          if ! git fetch origin "$BASE_REF" --depth=1; then
            echo "ERROR: failed to fetch base ref '$BASE_REF'."
            exit 1
          fi

          if ! git cat-file -e "${PR_HEAD}^{commit}" 2>/dev/null; then
            if ! git fetch origin "$HEAD_REF" --depth=1; then
              echo "ERROR: failed to fetch head ref '$HEAD_REF'."
              exit 1
            fi
          fi

          if ! git cat-file -e "${PR_HEAD}^{commit}" 2>/dev/null; then
            echo "ERROR: PR head commit '$PR_HEAD' is unavailable locally after fetch."
            exit 1
          fi

          MERGE_BASE=$(git merge-base "$BASE_SHA" "$PR_HEAD" || true)
          if [[ -z "$MERGE_BASE" ]]; then
            echo "ERROR: unable to compute merge-base for BASE_SHA='$BASE_SHA' and PR_HEAD='$PR_HEAD'."
            exit 1
          fi

          if ! MERGES=$(git rev-list --merges "$MERGE_BASE..$PR_HEAD"); then
            echo "ERROR: failed to compute merge-commit range for '$MERGE_BASE..$PR_HEAD'."
            exit 1
          fi

          if [[ -n "$MERGES" ]]; then
            echo "ERROR: merge commits detected in PR diff range:"
            echo "$MERGES"
            exit 1
          fi

          echo "Policy gate passed."
