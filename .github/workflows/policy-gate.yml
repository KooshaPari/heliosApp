name: Policy Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled, unlabeled, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  policy-gate:
    name: policy-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce PR branch policy
        shell: bash
        env:
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          set -euo pipefail

          if [[ "$HEAD_REF" == "main" || "$HEAD_REF" == "master" ]]; then
            echo "ERROR: shared branches cannot be used as PR head branches."
            exit 1
          fi

          if [[ "$HEAD_REF" == fix/* && ( "$BASE_REF" == "main" || "$BASE_REF" == "master" ) ]]; then
            if [[ "$PR_LABELS" != *"layered-pr-exception"* ]]; then
              echo "ERROR: fix/* PRs must target a layered branch or carry layered-pr-exception."
              exit 1
            fi
          fi

          git fetch origin "$BASE_REF" --depth=1 || true
          MERGES=$(git rev-list --merges "origin/$BASE_REF..$PR_HEAD_SHA" || true)
          if [[ -n "$MERGES" ]]; then
            echo "ERROR: merge commits detected in PR diff range:"
            echo "$MERGES"
            exit 1
          fi

          echo "Server-side policy gate passed."
