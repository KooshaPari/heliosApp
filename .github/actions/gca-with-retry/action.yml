name: "GCA with retry"
description: "Run a command with bounded retries and rate-limit detection."
inputs:
  command:
    description: "Shell command to run."
    required: false
    default: "echo 'No GCA command configured.'"
  max-retries:
    description: "Maximum retry attempts."
    required: false
    default: "5"
  initial-delay:
    description: "Initial retry delay in seconds."
    required: false
    default: "60"
  backoff-multiplier:
    description: "Backoff multiplier for retry delays."
    required: false
    default: "2"
  max-delay:
    description: "Maximum retry delay in seconds."
    required: false
    default: "900"
outputs:
  rate-limited:
    description: "Whether the command ended in a rate-limited failure."
runs:
  using: "composite"
  steps:
    - name: Run command with retry
      id: retry
      shell: bash
      run: |
        set -euo pipefail

        max_retries="${{ inputs.max-retries }}"
        delay="${{ inputs.initial-delay }}"
        multiplier="${{ inputs.backoff-multiplier }}"
        max_delay="${{ inputs.max-delay }}"
        cmd="${{ inputs.command }}"
        rate_limited="false"
        attempt=0
        command_output=""

        # Keep log output readable in GitHub Actions.
        sanitize() {
          tr -d '\0'
        }

        run_once() {
          set +e
          command_output="$(bash -lc "$cmd" 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$command_output" | sanitize
          return "$status"
        }

        while true; do
          attempt=$(( attempt + 1 ))
          if run_once; then
            echo "rate-limited=false" >> "$GITHUB_OUTPUT"
            echo "attempts=$attempt" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          status=$?
          if (( attempt >= max_retries )); then
            echo "rate-limited=$rate_limited" >> "$GITHUB_OUTPUT"
            echo "attempts=$attempt" >> "$GITHUB_OUTPUT"
            exit "$status"
          fi

          if echo "$command_output" | grep -Eiq '(rate.?limit|429|too many requests|retry|temporarily unavailable)'; then
            rate_limited="true"
          else
            echo "rate-limited=false" >> "$GITHUB_OUTPUT"
            echo "attempts=$attempt" >> "$GITHUB_OUTPUT"
            exit "$status"
          fi

          echo "Attempt $attempt failed due to suspected rate limit; retrying in ${delay}s."
          sleep "$delay"
          next_delay=$(( delay * multiplier ))
          if (( next_delay > max_delay )); then
            next_delay=$max_delay
          fi
          delay=$next_delay
        done
