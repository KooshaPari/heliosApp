version: "0.5"

environment:
  - VITE_PORT=${VITE_PORT:-3001}
  - VITE_PREVIEW_PORT=${VITE_PREVIEW_PORT:-4173}
  - HELIOS_APP_DEV_SCRIPT=${HELIOS_APP_DEV_SCRIPT:-dev:remote}
  - VITE_AUTHKIT_DOMAIN=${VITE_AUTHKIT_DOMAIN:-}
  - VITE_WORKOS_CLIENT_ID=${VITE_WORKOS_CLIENT_ID:-}
  - VITE_WORKOS_REDIRECT_URI=${VITE_WORKOS_REDIRECT_URI:-}

processes:
  helios-app:
    command: sh -c "bun run ${HELIOS_APP_DEV_SCRIPT:-dev:remote}"
    log_location: .process-compose/helios-app.log
    availability:
      restart: on_failure
    environment:
      - VITE_AUTHKIT_DOMAIN=${VITE_AUTHKIT_DOMAIN:-}
      - VITE_WORKOS_CLIENT_ID=${VITE_WORKOS_CLIENT_ID:-}
      - VITE_WORKOS_REDIRECT_URI=${VITE_WORKOS_REDIRECT_URI:-}
    readiness_probe:
      exec:
        command: sh -c "curl -fsS http://localhost:${VITE_PORT:-3001}/ >/dev/null"
      initial_delay_seconds: 5
      period_seconds: 5
      failure_threshold: 6
