version: "3"

vars:
  PROJECT_KIND:
    sh: |
      if [ -f bun.lock ] || [ -f bun.lockb ] || { [ -f package.json ] && grep -q '"packageManager"[[:space:]]*:[[:space:]]*"bun@' package.json; }; then
        echo bun
      elif [ -f package.json ]; then
        echo node
      elif [ -f go.mod ]; then
        echo go
      elif [ -f pyproject.toml ] || [ -f requirements.txt ]; then
        echo python
      elif [ -f Cargo.toml ]; then
        echo rust
      else
        echo unknown
      fi

tasks:
  default:
    cmds:
      - task --list
    silent: true

  language:
    desc: Print the detected project language/toolchain
    cmds:
      - echo "{{.PROJECT_KIND}}"

  build:
    desc: Build the project using detected language tooling
    cmds:
      - |
        set -euo pipefail
        case "{{.PROJECT_KIND}}" in
          bun)
            bun run build
            ;;
          node)
            npm run build
            ;;
          go)
            go build ./...
            ;;
          python)
            python -m compileall .
            ;;
          rust)
            cargo build --all-targets
            ;;
          *)
            echo "[FAIL] unable to detect project language from repository manifests"
            exit 1
            ;;
        esac

  test:
    desc: Run the primary test suite for the detected language
    cmds:
      - |
        set -euo pipefail
        case "{{.PROJECT_KIND}}" in
          bun)
            bun run test
            ;;
          node)
            npm test
            ;;
          go)
            go test ./...
            ;;
          python)
            if command -v pytest >/dev/null 2>&1; then
              pytest
            else
              python -m unittest discover
            fi
            ;;
          rust)
            cargo test --all-targets
            ;;
          *)
            echo "[FAIL] unable to detect project language from repository manifests"
            exit 1
            ;;
        esac

  lint:
    desc: Run static checks for the detected language
    cmds:
      - |
        set -euo pipefail
        case "{{.PROJECT_KIND}}" in
          bun)
            bun run lint
            ;;
          node)
            npm run lint
            ;;
          go)
            if command -v golangci-lint >/dev/null 2>&1; then
              golangci-lint run
            else
              go vet ./...
            fi
            ;;
          python)
            if command -v ruff >/dev/null 2>&1; then
              ruff check .
            else
              python -m compileall .
            fi
            ;;
          rust)
            cargo clippy --all-targets --all-features
            ;;
          *)
            echo "[FAIL] unable to detect project language from repository manifests"
            exit 1
            ;;
        esac

  clean:
    desc: Remove generated artifacts from the working tree
    cmds:
      - git clean -fdX -- .
