version: "3"

vars:
  PROJECT_LANGUAGE:
    sh: |
      if [ -f tsconfig.json ] || [ -f tsconfig.base.json ]; then
        echo typescript
      elif [ -f package.json ]; then
        echo javascript
      elif [ -f go.mod ]; then
        echo go
      elif [ -f pyproject.toml ] || [ -f requirements.txt ]; then
        echo python
      elif [ -f Cargo.toml ]; then
        echo rust
      else
        echo unknown
      fi
  PROJECT_TOOLCHAIN:
    sh: |
      if [ -f bun.lock ] || [ -f bun.lockb ] || { [ -f package.json ] && grep -q '"packageManager"[[:space:]]*:[[:space:]]*"bun@' package.json; }; then
        echo bun
      elif [ -f package.json ]; then
        echo node
      elif [ -f go.mod ]; then
        echo go
      elif [ -f pyproject.toml ] || [ -f requirements.txt ]; then
        echo python
      elif [ -f Cargo.toml ]; then
        echo rust
      else
        echo unknown
      fi
  BUILD_COMMAND:
    sh: |
      if [ -f package.json ] && node -e "process.exit(require('./package.json').scripts?.build ? 0 : 1)"; then
        echo "bun run build"
      else
        echo ""
      fi
  TEST_COMMAND:
    sh: |
      if [ -f package.json ] && node -e "process.exit(require('./package.json').scripts?.test ? 0 : 1)"; then
        echo "bun run test"
      else
        echo ""
      fi
  LINT_COMMAND:
    sh: |
      if [ -f package.json ] && node -e "process.exit(require('./package.json').scripts?.lint ? 0 : 1)"; then
        echo "bun run lint"
      else
        echo ""
      fi

tasks:
  default:
    cmds:
      - task --list
    silent: true

  language:
    desc: Print the detected project language/toolchain
    cmds:
      - echo "{{.PROJECT_LANGUAGE}}/{{.PROJECT_TOOLCHAIN}}"

  build:
    desc: Build the detected project
    cmds:
      - |
        set -euo pipefail
        case "{{.PROJECT_TOOLCHAIN}}" in
          bun)
            if [ -z "{{.BUILD_COMMAND}}" ]; then
              echo "[FAIL] package.json does not define a build script"
              exit 1
            fi
            {{.BUILD_COMMAND}}
            ;;
          node)
            npm run build
            ;;
          go)
            go build ./...
            ;;
          python)
            python -m compileall .
            ;;
          rust)
            cargo build --all-targets
            ;;
          *)
            echo "[FAIL] unable to detect project language from repository manifests"
            exit 1
            ;;
        esac

  test:
    desc: Run the primary test suite for the detected project
    cmds:
      - |
        set -euo pipefail
        case "{{.PROJECT_TOOLCHAIN}}" in
          bun)
            if [ -z "{{.TEST_COMMAND}}" ]; then
              echo "[FAIL] package.json does not define a test script"
              exit 1
            fi
            {{.TEST_COMMAND}}
            ;;
          node)
            npm test
            ;;
          go)
            go test ./...
            ;;
          python)
            if command -v pytest >/dev/null 2>&1; then
              pytest
            else
              python -m unittest discover
            fi
            ;;
          rust)
            cargo test --all-targets
            ;;
          *)
            echo "[FAIL] unable to detect project language from repository manifests"
            exit 1
            ;;
        esac

  lint:
    desc: Run static checks for the detected project
    cmds:
      - |
        set -euo pipefail
        case "{{.PROJECT_TOOLCHAIN}}" in
          bun)
            if [ -z "{{.LINT_COMMAND}}" ]; then
              echo "[FAIL] package.json does not define a lint script"
              exit 1
            fi
            {{.LINT_COMMAND}}
            ;;
          node)
            npm run lint
            ;;
          go)
            if command -v golangci-lint >/dev/null 2>&1; then
              golangci-lint run
            else
              go vet ./...
            fi
            ;;
          python)
            if command -v ruff >/dev/null 2>&1; then
              ruff check .
            else
              python -m compileall .
            fi
            ;;
          rust)
            cargo clippy --all-targets --all-features
            ;;
          *)
            echo "[FAIL] unable to detect project language from repository manifests"
            exit 1
            ;;
        esac

  clean:
    desc: Remove generated artifacts from the working tree
    cmds:
      - |
        set -euo pipefail
        rm -rf \
          apps/desktop/dist \
          apps/runtime/dist \
          apps/colab-renderer/dist \
          docs/.vitepress/dist \
          coverage \
          .turbo \
          .vite \
          .vitest
