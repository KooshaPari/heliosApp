# CodeRabbit AI Code Review Configuration

# Global settings
pr_validation:
  block_on:
    severity: info

rules:
  - type: patch
    description: |
      Automated code review for pull requests to main.
      Rate-limiting blocks merge with author notification.

# Automatic review on PR events
review:
  auto: true
  # Trigger review on PR creation and updates
  on: [pull_request]
  
  # Review only changes on main branch PRs
  rules:
    - branch: main
      enabled: true
      
      # Large PR handling
      max_files: 50
      max_lines: 2000
      
      # Timeout with retry
      timeout_seconds: 300

# Chat settings
chat:
  auto_reply: true

# Autofix disabled to prevent unwanted changes
autofix: false

# CodeRabbit settings with retry configuration
settings:
  # Rate limit handling: stay pending, retry
  rate_limit:
    strategy: block_and_retry
    initial_delay_seconds: 60
    backoff_multiplier: 2
    max_retries: 5
    max_wait_seconds: 900
    
  # Failure behavior: block merge
  on_failure:
    action: block_merge
    notify_author: true

# Skip review for specific files/patterns (merged with auto review above)
# Note: max_files and max_lines are limits on total review size (e.g., 50 files, 2000 lines) 
# and do not act as path exclusions; to skip specific paths such as docs or node_modules 
# the configuration must use explicit path_filters.
